<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Сайт курсов{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }
        nav {
            background: #222;
            padding: 14px 20px;
        }
        nav a,
        nav button {
            color: white;
            text-decoration: none;
            margin-right: 16px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            font: inherit;
            padding: 0;
        }
        nav a:hover,
        nav button:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .logout-form {
            display: inline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Главная</a>
        <a href="{% url 'product-list' %}">Курсы</a>
        <a href="{% url 'about' %}">О нас</a>
        <a href="{% url 'contacts' %}">Контакты</a>

        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Профиль</a>
            <form action="{% url 'logout' %}" method="post" class="logout-form">
                {% csrf_token %}
                <button type="submit">Выйти</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Войти</a>
            <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

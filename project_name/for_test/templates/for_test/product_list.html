{% extends 'base.html' %}

{% block title %}Товары{% endblock %}

{% block content %}
<h1>Список товаров</h1>

{% if products %}
    <ul>
        {% for product in products %}
            <li>
                <a href="{% url 'product-detail' product.pk %}">{{ product.name }}</a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Товаров пока нет.</p>
{% endif %}
{% endblock %}
